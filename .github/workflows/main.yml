name: Deploy to MEICaixa BackEnd

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.x.x'
    
    - name: Restore dependencies
      run: dotnet restore ./MEI.sln
    
    - name: Build
      run: dotnet build ./MEI.sln -c Release --no-restore
    
    - name: Publish API
      run: dotnet publish ./GestorMEI.API/GestorMEI.API.csproj -c Release --no-build -o ./MEI/publish

    - name: Publish Identity
      run: dotnet publish ./GestorMEI.Identity/GestorMEI.Identity.csproj -c Release --no-build -o ./MEI.Identity/publish

    - name: Create tarball
      run: tar --no-same-permissions -cvf publish.tar ./GestorMEI
    
    - name: Deploy to MEICaixa API
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: './MEI/publish'
        target: '/var/www/html'
        port: 22

    - name: Deploy to MEICaixa Identity
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: './MEI.Identity/publish'
        target: '/var/www/html'
        port: 22
    
    - name: Restart service
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.VM_HOST}}
        username: ${{secrets.VM_USERNAME}}
        password: ${{secrets.VM_PASSWORD}}
        script: |
          echo "${{ secrets.VM_PASSWORD }}" | sudo -S systemctl restart MEI.API.service
          echo "${{ secrets.VM_PASSWORD }}" | sudo -S systemctl restart MEI.Identity.service
      env:
        VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
